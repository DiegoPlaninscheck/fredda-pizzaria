services:
  db:
    image: mysql:8.0
    container_name: fredda_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fredda_pizzaria}
      MYSQL_USER: ${MYSQL_USER:-fredda}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fredda123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fredda_app
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-fredda}:${MYSQL_PASSWORD:-fredda123}@db:3306/${MYSQL_DATABASE:-fredda_pizzaria}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
